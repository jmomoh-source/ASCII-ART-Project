name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.22.x'

    - name: Run Tests
      run: go test -v ./...

    - name: Static Analysis
      if: runner.os == 'Linux'
      uses: golangci/golangci-lint-action@v5
      with:
        version: latest
